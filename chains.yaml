# Chain configuration
#
# Each chain supports one RPC endpoint or a prioritised fallback list.
# On any RPC failure the client automatically retries the next URL in order.
#
# Keys:
#   name      (required) — identifier used throughout the app
#   rpc_url   — single endpoint (backward-compatible shorthand)
#   rpc_urls  — ordered list of endpoints; tried top-to-bottom on failure
#               rpc_url and rpc_urls can both be set; rpc_urls is tried first
#   chain_id  (optional) — auto-fetched from the node if omitted
#   poa       (optional) — set true for PoA networks (BSC, Polygon, etc.)
#
# Examples:
#
# - name: ethereum
#   rpc_urls:
#     - https://mainnet.infura.io/v3/YOUR_KEY      # primary
#     - https://eth-mainnet.g.alchemy.com/v2/KEY   # fallback 1
#     - https://rpc.ankr.com/eth                   # fallback 2
#   chain_id: 1
#   poa: false
#
# - name: bsc
#   rpc_urls:
#     - https://bsc-dataseed1.binance.org
#     - https://bsc-dataseed2.binance.org
#     - https://bsc-dataseed3.binance.org
#   chain_id: 56
#   poa: true

- name: anvil
  rpc_urls:
    # - ws://localhost:8545
    - ws://host.docker.internal:8545
  chain_id: 31337
  poa: false
